<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notes — EduBoost Nepal</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: { extend: { fontFamily: { sans: ["Sora", "sans-serif"] } } },
      };
    </script>
    <style>
      .glass {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      .gradient-text {
        background: linear-gradient(135deg, #fb923c, #f97316, #dc2626);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .btn-primary {
        background: linear-gradient(135deg, #f97316, #dc2626);
      }
      .filter-btn {
        transition: all 0.2s;
      }
      .filter-btn.active {
        background: linear-gradient(135deg, #f97316, #dc2626);
        color: white;
      }
      .note-card {
        transition:
          transform 0.3s,
          box-shadow 0.3s;
        cursor: pointer;
      }
      .note-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 16px 40px rgba(249, 115, 22, 0.15);
      }
      .nepal-stripe {
        background: linear-gradient(90deg, #003893 50%, #dc143c 50%);
        height: 3px;
      }
      .note-content h2 {
        font-size: 1.25rem;
        font-weight: 700;
        color: #fb923c;
        margin: 1rem 0 0.5rem;
      }
      .note-content h3 {
        font-size: 1rem;
        font-weight: 600;
        color: #94a3b8;
        margin: 0.75rem 0 0.25rem;
      }
      .note-content ul {
        list-style: disc;
        margin-left: 1.5rem;
        color: #cbd5e1;
      }
      .note-content li {
        margin-bottom: 0.25rem;
      }
      .note-content p {
        color: #cbd5e1;
        margin-bottom: 0.5rem;
      }
      .note-content strong {
        color: white;
      }
      /* auth guard */
      body {
        visibility: hidden;
      }
      body.auth-ready {
        visibility: visible;
      }
      /* scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #0f172a;
      }
      ::-webkit-scrollbar-thumb {
        background: #334155;
        border-radius: 3px;
      }
    </style>
  </head>
  <body class="bg-slate-950 text-white font-sans min-h-screen">
    <div class="nepal-stripe w-full"></div>

    <!-- Nav -->
    <nav
      class="bg-slate-900 border-b border-slate-800 px-6 py-4 flex items-center justify-between"
    >
      <div class="flex items-center gap-4">
        <a
          href="dashboard.html"
          class="text-slate-400 hover:text-white transition-colors"
          >← Back</a
        >
        <span class="text-slate-600">|</span>
        <h1 class="font-bold text-lg">
          📚 Study <span class="gradient-text">Notes</span>
        </h1>
      </div>
      <div class="flex items-center gap-3">
        <input
          id="searchNotes"
          type="text"
          placeholder="Search notes..."
          class="bg-slate-800 border border-slate-700 rounded-xl px-4 py-2 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-orange-400 w-48 md:w-64"
          oninput="applyFilters()"
        />
      </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
      <!-- Filters -->
      <div class="flex flex-wrap gap-4 mb-8">
        <!-- Class Filter -->
        <div>
          <div
            class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2"
          >
            Class
          </div>
          <div class="flex gap-2">
            <button
              onclick="setClassFilter('all')"
              id="classAll"
              class="filter-btn active px-4 py-2 rounded-xl text-sm font-medium glass"
            >
              All
            </button>
            <button
              onclick="setClassFilter('11')"
              id="class11"
              class="filter-btn px-4 py-2 rounded-xl text-sm font-medium glass text-slate-300"
            >
              Class 11
            </button>
            <button
              onclick="setClassFilter('12')"
              id="class12"
              class="filter-btn px-4 py-2 rounded-xl text-sm font-medium glass text-slate-300"
            >
              Class 12
            </button>
          </div>
        </div>
        <!-- Subject Filter -->
        <div>
          <div
            class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2"
          >
            Subject
          </div>
          <div class="flex gap-2 flex-wrap" id="subjectFilters">
            <button
              onclick="setSubjectFilter('all', this)"
              id="subjAll"
              class="filter-btn active px-4 py-2 rounded-xl text-sm font-medium glass"
            >
              All
            </button>
            <button
              onclick="setSubjectFilter('Physics', this)"
              class="filter-btn px-4 py-2 rounded-xl text-sm font-medium glass text-slate-300"
            >
              ⚛️ Physics
            </button>
            <button
              onclick="setSubjectFilter('Chemistry', this)"
              class="filter-btn px-4 py-2 rounded-xl text-sm font-medium glass text-slate-300"
            >
              🧪 Chemistry
            </button>
            <button
              onclick="setSubjectFilter('Biology', this)"
              class="filter-btn px-4 py-2 rounded-xl text-sm font-medium glass text-slate-300"
            >
              🧬 Biology
            </button>
            <button
              onclick="setSubjectFilter('Mathematics', this)"
              class="filter-btn px-4 py-2 rounded-xl text-sm font-medium glass text-slate-300"
            >
              📐 Math
            </button>
            <button
              onclick="setSubjectFilter('Computer Science', this)"
              class="filter-btn px-4 py-2 rounded-xl text-sm font-medium glass text-slate-300"
            >
              💻 CS
            </button>
          </div>
        </div>
      </div>

      <!-- Notes Grid -->
      <div
        id="notesGrid"
        class="grid md:grid-cols-2 lg:grid-cols-3 gap-5"
      ></div>

      <!-- Empty state -->
      <div id="emptyState" class="hidden text-center py-16">
        <div class="text-5xl mb-4">🔍</div>
        <div class="text-slate-400">No notes found matching your filters.</div>
      </div>
    </div>

    <script>
      // ── FIREBASE AUTH GUARD ───────────────────────────────────────────────
      // Firebase config is loaded from utils.js
      const FIREBASE_CONFIG = {
        apiKey: "AIzaSyCbVzplSn0UL2KRB3B45SCByJSm2FXPByw",
        authDomain: "eduboost-f611f.firebaseapp.com",
        projectId: "eduboost-f611f",
        storageBucket: "eduboost-f611f.firebasestorage.app",
        messagingSenderId: "121788124993",
        appId: "1:121788124993:web:4df0ec72b1e187e76c1bc0",
        measurementId: "G-1SDQZYXSKS",
      };

      firebase.initializeApp(FIREBASE_CONFIG);
      const auth = firebase.auth();

      // Enhanced auth guard with timeout protection
      let authCheckComplete = false;
      const authTimeout = setTimeout(() => {
        if (!authCheckComplete) {
          console.warn("Auth check timeout - redirecting to login");
          window.location.replace("login.html");
        }
      }, 5000); // 5 second timeout

      auth.onAuthStateChanged(function (user) {
        authCheckComplete = true;
        clearTimeout(authTimeout);

        if (!user) {
          // Not logged in → redirect to login page
          window.location.replace("login.html");
        } else {
          // Logged in → reveal page and boot app
          document.body.classList.add("auth-ready");
          renderNotes(staticNotes);
        }
      });

      // ── DATA ─────────────────────────────────────────────────────────────
      const staticNotes = [
        {
          id: "chem12-ionic",
          class: "12",
          subject: "Chemistry",
          chapter: "Ionic Equilibrium",
          title: "Ionic Equilibrium — Chapter 2",
          icon: "🧪",
          summary:
            "NEB Class 12 Ionic Equilibrium PDF for acids, bases, pH, buffers, and solubility product.",
          tags: ["Ionic Equilibrium", "Chemistry", "Class 12", "Equilibrium"],
          externalUrl:
            "https://drive.google.com/file/d/1w8lo_PZMeQhIjQDxyp4o_kYOaeHEaog4/view?usp=sharing",
          content: `
            <h2>Chapter 2: Ionic Equilibrium</h2>
            <p>This entry opens the NEB Class 12 Ionic Equilibrium PDF from Google Drive.</p>
            <p>Use the embedded viewer or click the link to open the PDF in Drive.</p>
          `,
        },
        {
          id: "chem12-volumetric",
          class: "12",
          subject: "Chemistry",
          chapter: "Volumetric Analysis",
          title: "Volumetric Analysis — NEB Class 12",
          icon: "📘",
          summary:
            "Volumetric Analysis NEB Class 12 PDF for titration concepts, formulas, and solved examples.",
          tags: ["Volumetric Analysis", "Chemistry", "Class 12", "Titration"],
          externalUrl:
            "https://drive.google.com/file/d/1z61VRYHeOxPlbzPiATFBNeAoXfpu-9A6/view?usp=sharing",
          content: `
            <h2>Volumetric Analysis</h2>
            <p>This note opens the NEB Class 12 Volumetric Analysis PDF from Google Drive.</p>
            <p>Use the embedded viewer or click the link to open the PDF in Drive.</p>
          `,
        },
      ];

      // ── STATE ─────────────────────────────────────────────────────────────
      let activeClassFilter = "all";
      let activeSubjectFilter = "all";

      // ── RENDER ────────────────────────────────────────────────────────────
      const subjectColors = {
        Physics: "from-blue-500/20 to-blue-600/10 border-blue-500/30",
        Chemistry: "from-purple-500/20 to-purple-600/10 border-purple-500/30",
        Biology: "from-green-500/20 to-green-600/10 border-green-500/30",
        Mathematics: "from-yellow-500/20 to-yellow-600/10 border-yellow-500/30",
        "Computer Science":
          "from-cyan-500/20 to-cyan-600/10 border-cyan-500/30",
      };

      function renderNotes(notes) {
        const grid = document.getElementById("notesGrid");
        const empty = document.getElementById("emptyState");
        if (notes.length === 0) {
          grid.innerHTML = "";
          empty.classList.remove("hidden");
          return;
        }
        empty.classList.add("hidden");
        grid.innerHTML = notes
          .map(
            (note) => `
          <div class="note-card glass rounded-2xl p-6 border bg-gradient-to-br ${subjectColors[note.subject] || "from-slate-700/20 to-slate-800/10 border-slate-600/30"}"
               onclick="openNote('${note.id}')" tabindex="0" role="button"
               onkeydown="if(event.key==='Enter')openNote('${note.id}')">
            <div class="flex items-start justify-between mb-4">
              <div class="text-3xl">${note.icon || "📖"}</div>
              <span class="glass px-2.5 py-1 rounded-lg text-xs font-semibold text-slate-300">Class ${note.class}</span>
            </div>
            <div class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">${note.subject} • ${note.chapter}</div>
            <h3 class="font-bold text-lg mb-3 leading-tight">${note.title}</h3>
            <p class="text-slate-400 text-sm leading-relaxed mb-4">${note.summary}</p>
            <div class="flex flex-wrap gap-1.5">
              ${(note.tags || []).map((tag) => `<span class="bg-slate-700/50 px-2.5 py-0.5 rounded-lg text-xs text-slate-300">${tag}</span>`).join("")}
            </div>
            <div class="mt-4 pt-4 border-t border-slate-700/50 text-xs text-orange-400 font-semibold">
              Read Notes →
            </div>
          </div>
        `,
          )
          .join("");
      }

      // ── FILTERS ───────────────────────────────────────────────────────────
      function setClassFilter(cls) {
        activeClassFilter = cls;
        document
          .querySelectorAll('[id^="class"]')
          .forEach((b) => b.classList.remove("active", "text-white"));
        document
          .getElementById(`class${cls === "all" ? "All" : cls}`)
          .classList.add("active");
        applyFilters();
      }

      function setSubjectFilter(subject, btn) {
        activeSubjectFilter = subject;
        document.querySelectorAll("#subjectFilters button").forEach((b) => {
          b.classList.remove("active");
          b.classList.add("text-slate-300");
        });
        btn.classList.add("active");
        btn.classList.remove("text-slate-300");
        applyFilters();
      }

      function applyFilters() {
        const search = document
          .getElementById("searchNotes")
          .value.toLowerCase()
          .trim();
        const filtered = staticNotes.filter((note) => {
          const matchClass =
            activeClassFilter === "all" || note.class === activeClassFilter;
          const matchSubject =
            activeSubjectFilter === "all" ||
            note.subject === activeSubjectFilter;
          const matchSearch =
            !search ||
            note.title.toLowerCase().includes(search) ||
            note.summary.toLowerCase().includes(search) ||
            note.subject.toLowerCase().includes(search) ||
            note.chapter.toLowerCase().includes(search) ||
            (note.tags || []).some((t) => t.toLowerCase().includes(search));
          return matchClass && matchSubject && matchSearch;
        });
        renderNotes(filtered);
      }

      // ── MODAL ─────────────────────────────────────────────────────────────
      function openNote(id) {
        const note = staticNotes.find((n) => n.id === id);
        if (!note) return;

        // Store note data in localStorage for viewer.html
        localStorage.setItem("currentNote", JSON.stringify(note));

        // Redirect to viewer.html — it handles both Drive PDFs and internal content
        window.location.href = `viewer.html?id=${id}`;
      }

      // renderNotes is called by auth.onAuthStateChanged above after login is confirmed
    </script>
  </body>
</html>
