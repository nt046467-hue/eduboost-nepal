<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Downloads — EduBoost Nepal</title>
    <link rel="icon" href="../public/favicon.png" type="image/png" />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../js/utils.js"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: { extend: { fontFamily: { sans: ["Sora", "sans-serif"] } } },
      };
    </script>
    <style>
      .glass {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      .gradient-text {
        background: linear-gradient(135deg, #fb923c, #f97316, #dc2626);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .btn-primary {
        background: linear-gradient(135deg, #f97316, #dc2626);
      }
      .download-card {
        transition:
          transform 0.3s,
          box-shadow 0.3s;
      }
      .download-card:hover {
        transform: translateY(-3px);
        box-shadow: 0 16px 40px rgba(249, 115, 22, 0.15);
      }
      .progress-bar {
        background: linear-gradient(90deg, #f97316, #dc2626);
        height: 4px;
        border-radius: 2px;
        transition: width 0.3s;
      }
      .nepal-stripe {
        background: linear-gradient(90deg, #003893 50%, #dc143c 50%);
        height: 3px;
      }
      .file-type-pdf {
        background: rgba(239, 68, 68, 0.15);
        border-color: rgba(239, 68, 68, 0.3);
        color: #fca5a5;
      }
      .file-type-doc {
        background: rgba(59, 130, 246, 0.15);
        border-color: rgba(59, 130, 246, 0.3);
        color: #93c5fd;
      }
      .filter-btn.active {
        background: linear-gradient(135deg, #f97316, #dc2626);
        color: white;
      }
    </style>
  </head>
  <body class="bg-slate-950 text-white font-sans min-h-screen">
    <div class="nepal-stripe w-full"></div>

    <nav
      class="bg-slate-900 border-b border-slate-800 px-6 py-4 flex items-center justify-between"
    >
      <div class="flex items-center gap-4">
        <a
          href="dashboard.html"
          class="text-slate-400 hover:text-white transition-colors text-sm"
          >← Dashboard</a
        >
        <span class="text-slate-600">|</span>
        <h1 class="font-bold text-lg">
          📥 <span class="gradient-text">Downloads</span>
        </h1>
      </div>
    </nav>

    <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
      <!-- Header -->
      <div class="text-center mb-10">
        <h1 class="font-serif text-4xl mb-4">
          Study <span class="gradient-text">Resources</span>
        </h1>
        <p class="text-slate-400">
          NEB past papers, summary notes, and revision PDFs — all free to
          download.
        </p>
      </div>

      <!-- Stats -->
      <div class="grid grid-cols-3 gap-4 mb-10">
        <div class="glass rounded-2xl p-5 text-center">
          <div class="text-3xl font-bold gradient-text">4</div>
          <div class="text-slate-400 text-sm mt-1">PDF Resources</div>
        </div>
        <div class="glass rounded-2xl p-5 text-center">
          <div class="text-3xl font-bold gradient-text">3</div>
          <div class="text-slate-400 text-sm mt-1">Subjects</div>
        </div>
        <div class="glass rounded-2xl p-5 text-center">
          <div class="text-3xl font-bold gradient-text">Free</div>
          <div class="text-slate-400 text-sm mt-1">Always Free</div>
        </div>
      </div>

      <!-- Filters -->
      <div class="flex flex-wrap gap-2 mb-8">
        <button
          onclick="filterDownloads('all')"
          class="filter-btn active px-4 py-2 rounded-xl text-sm font-medium glass"
        >
          All
        </button>
        <button
          onclick="filterDownloads('past-papers')"
          class="filter-btn px-4 py-2 rounded-xl text-sm font-medium glass text-slate-300"
        >
          📄 Past Papers
        </button>
        <button
          onclick="filterDownloads('notes')"
          class="filter-btn px-4 py-2 rounded-xl text-sm font-medium glass text-slate-300"
        >
          📚 Notes
        </button>
        <button
          onclick="filterDownloads('physics')"
          class="filter-btn px-4 py-2 rounded-xl text-sm font-medium glass text-slate-300"
        >
          ⚛️ Physics
        </button>
        <button
          onclick="filterDownloads('chemistry')"
          class="filter-btn px-4 py-2 rounded-xl text-sm font-medium glass text-slate-300"
        >
          🧪 Chemistry
        </button>
        <button
          onclick="filterDownloads('math')"
          class="filter-btn px-4 py-2 rounded-xl text-sm font-medium glass text-slate-300"
        >
          📐 Math
        </button>
        <button
          onclick="filterDownloads('class11')"
          class="filter-btn px-4 py-2 rounded-xl text-sm font-medium glass text-slate-300"
        >
          Class 11
        </button>
        <button
          onclick="filterDownloads('class12')"
          class="filter-btn px-4 py-2 rounded-xl text-sm font-medium glass text-slate-300"
        >
          Class 12
        </button>
      </div>

      <!-- Search -->
      <div class="mb-8">
        <input
          id="searchDownloads"
          type="text"
          placeholder="Search resources..."
          class="w-full md:w-96 bg-slate-800 border border-slate-700 rounded-xl px-5 py-3 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-orange-400"
          oninput="filterDownloads('all')"
        />
      </div>

      <!-- Downloads Grid -->
      <div id="downloadsGrid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-5">
        <!-- Rendered by JS -->
      </div>
    </div>

    <!-- Download Progress Toast -->
    <div
      id="downloadProgress"
      class="hidden fixed bottom-6 left-1/2 -translate-x-1/2 glass rounded-2xl p-5 shadow-2xl z-50 min-w-72"
    >
      <div class="flex items-center gap-3 mb-3">
        <div class="text-xl">⬇️</div>
        <div>
          <div class="font-semibold text-sm" id="downloadFileName">
            Downloading...
          </div>
          <div class="text-slate-400 text-xs" id="downloadSize">
            Preparing file...
          </div>
        </div>
      </div>
      <div class="bg-slate-700 rounded-full h-1 overflow-hidden">
        <div class="progress-bar" id="progressBar" style="width: 0%"></div>
      </div>
    </div>

    <script>
      const downloads = [
        {
          id: 14,
          title:
            "NEB Solution of CHEMISTRY (Class 12) Old is Gold Question Bank Asmita Publication",
          subject: "Chemistry",
          category: "past-papers",
          class: 12,
          type: "pdf",
          size: "71.3 MB",
          pages: 892,
          icon: "🧪",
          tags: ["chemistry", "class12", "past-papers", "question-bank"],
          description:
            "Complete NEB Chemistry Class 12 question bank with detailed solutions from Asmita Publication. Old is Gold series.",
          color: "from-purple-500/20 to-purple-600/5 border-purple-500/20",
          url: "https://drive.google.com/uc?export=download&id=1ihIKzY2VKbiUQEFHhkHZwEK8oa_hSF9O",
        },
        {
          id: 11,
          title:
            "NEB Solution of PHYSICS (Class 12) Old Is Gold Question Bank Asmita Publication",
          subject: "Physics",
          category: "past-papers",
          class: 12,
          type: "pdf",
          size: "159.8 MB",
          pages: 1247,
          icon: "⚛️",
          tags: ["physics", "class12", "past-papers", "question-bank"],
          description:
            "Complete NEB Physics Class 12 question bank with detailed solutions from Asmita Publication. Old is Gold series.",
          color: "from-blue-500/20 to-blue-600/5 border-blue-500/20",
          url: "https://drive.google.com/uc?export=download&id=1OHhT8uiMXcukpWJJjBYhKbEMi34YH2Xp",
        },
        {
          id: 16,
          title:
            "NEB Solution of Mathematics (Class 12) Old is Gold Question Bank Asmita Publication",
          subject: "Mathematics",
          category: "past-papers",
          class: 12,
          type: "pdf",
          size: "101.4 MB",
          pages: 967,
          icon: "📐",
          tags: ["math", "class12", "past-papers", "question-bank"],
          description:
            "Complete NEB Mathematics Class 12 question bank with detailed solutions from Asmita Publication. Old is Gold series.",
          color: "from-yellow-500/20 to-yellow-600/5 border-yellow-500/20",
          url: "https://drive.google.com/uc?export=download&id=1wcVjX4FAs8uXgZKD9b9OfI7WCvjcDsbk",
        },
        {
          id: 15,
          title: "Ionic Equilibrium — Class 12 Chemistry Chapter 2",
          subject: "Chemistry",
          category: "notes",
          class: 12,
          type: "html",
          size: "8.3 MB",
          pages: 45,
          icon: "🧪",
          tags: [
            "chemistry",
            "class12",
            "notes",
            "ionic-equilibrium",
            "acids-bases",
          ],
          description:
            "Complete HTML notes for Ionic Equilibrium Chapter 2 including acids, bases, pH, buffers, and solubility product with solved examples.",
          color: "from-purple-500/20 to-purple-600/5 border-purple-500/20",
          url: "https://drive.google.com/uc?export=download&id=1Og-bjMWEoFJxm4Yn5ioso5TZmMzdyiaX",
        },
      ];

      let activeFilter = "all";

      function renderDownloads(items) {
        const grid = document.getElementById("downloadsGrid");
        if (items.length === 0) {
          grid.innerHTML =
            '<div class="col-span-3 text-center py-12"><div class="text-4xl mb-3">🔍</div><div class="text-slate-400">No resources found.</div></div>';
          return;
        }

        grid.innerHTML = items
          .map(
            (item) => `
      <div class="download-card glass rounded-2xl overflow-hidden bg-gradient-to-br ${item.color}">
        <div class="p-6">
          <div class="flex items-start justify-between mb-4">
            <div class="text-3xl">${item.icon}</div>
            <div class="flex flex-col items-end gap-1">
              <span class="file-type-pdf border rounded-lg px-2 py-0.5 text-xs font-bold uppercase">PDF</span>
              <span class="text-slate-500 text-xs">Class ${item.class}</span>
            </div>
          </div>
          <h3 class="font-bold text-base leading-tight mb-2">${item.title}</h3>
          <p class="text-slate-400 text-xs leading-relaxed mb-4">${item.description}</p>
          <div class="flex items-center justify-between text-xs text-slate-500 mb-5">
            <span>📑 ${item.pages} pages</span>
            <span>💾 ${item.size}</span>
            <span>📚 ${item.subject}</span>
          </div>
          <button onclick="downloadFile(${item.id}, '${item.title}', '${item.size}')"
            class="btn-primary w-full text-white font-semibold py-3 rounded-xl text-sm transition-all hover:opacity-90 hover:-translate-y-0.5">
            ⬇️ Download PDF
          </button>
        </div>
      </div>
    `,
          )
          .join("");
      }

      function filterDownloads(filter) {
        document.querySelectorAll(".filter-btn").forEach((b) => {
          b.classList.remove("active");
          b.classList.add("text-slate-300");
        });
        event?.target?.classList?.add("active");
        event?.target?.classList?.remove("text-slate-300");
        activeFilter = filter;

        const search = document
          .getElementById("searchDownloads")
          .value.toLowerCase();
        const filtered = downloads.filter((d) => {
          const matchFilter = filter === "all" || d.tags.includes(filter);
          const matchSearch =
            !search ||
            d.title.toLowerCase().includes(search) ||
            d.subject.toLowerCase().includes(search);
          return matchFilter && matchSearch;
        });
        renderDownloads(filtered);
      }

      function downloadFile(id, name, size) {
        const item = downloads.find((d) => d.id === id);

        // Show download progress UI
        const progressEl = document.getElementById("downloadProgress");
        const fileNameEl = document.getElementById("downloadFileName");
        const fileSizeEl = document.getElementById("downloadSize");
        const progressBar = document.getElementById("progressBar");

        fileNameEl.textContent = name;
        fileSizeEl.textContent = size;
        progressEl.classList.remove("hidden");
        progressBar.style.width = "0%";

        // Simulate download progress
        let progress = 0;
        const interval = setInterval(() => {
          progress += Math.random() * 20;
          if (progress >= 100) {
            progress = 100;
            clearInterval(interval);
            fileSizeEl.textContent = "Download complete!";

            // Actually trigger download if URL is a real link
            if (item.url && item.url !== "#") {
              const a = document.createElement("a");
              a.href = item.url;
              a.download = name + ".pdf";
              a.target = "_blank";
              a.rel = "noopener noreferrer";
              document.body.appendChild(a);
              a.click();
              document.body.removeChild(a);
            } else {
              // Show "coming soon" message for dummy URLs
              setTimeout(() => {
                showToast("This file will be available soon! 📥", "info");
              }, 500);
            }

            setTimeout(() => progressEl.classList.add("hidden"), 2000);
          }
          progressBar.style.width = `${Math.min(progress, 100)}%`;
        }, 200);
      }

      // Initial render
      renderDownloads(downloads);
    </script>
  </body>
</html>
