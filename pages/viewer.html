<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Note Viewer — EduBoost Nepal</title>
    <link rel="icon" href="../public/favicon.png" type="image/png" />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../js/utils.js"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: { extend: { fontFamily: { sans: ["Sora", "sans-serif"] } } },
      };
    </script>
    <style>
      .glass {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      .gradient-text {
        background: linear-gradient(135deg, #fb923c, #f97316, #dc2626);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .nepal-stripe {
        background: linear-gradient(90deg, #003893 50%, #dc143c 50%);
        height: 3px;
      }
      .note-content h2 {
        font-size: 1.5rem;
        font-weight: 700;
        color: #fb923c;
        margin: 2rem 0 1rem;
        border-bottom: 1px solid rgba(249, 115, 22, 0.2);
        padding-bottom: 0.5rem;
      }
      .note-content h3 {
        font-size: 1.125rem;
        font-weight: 600;
        color: #94a3b8;
        margin: 1.5rem 0 0.5rem;
      }
      .note-content ul {
        list-style: disc;
        margin-left: 1.5rem;
        color: #cbd5e1;
      }
      .note-content li {
        margin-bottom: 0.25rem;
      }
      .note-content p {
        color: #cbd5e1;
        margin-bottom: 0.75rem;
        line-height: 1.6;
      }
      .note-content strong {
        color: white;
        font-weight: 600;
      }
      .note-content code {
        background: rgba(71, 85, 105, 0.5);
        padding: 0.125rem 0.25rem;
        border-radius: 0.25rem;
        font-family: 'Courier New', monospace;
        font-size: 0.875em;
      }
      .note-content blockquote {
        border-left: 3px solid #fb923c;
        padding-left: 1rem;
        margin: 1rem 0;
        color: #94a3b8;
        font-style: italic;
      }
    </style>
  </head>
  <body class="bg-slate-950 text-white font-sans min-h-screen">
    <div class="nepal-stripe w-full"></div>

    <!-- Header -->
    <nav class="bg-slate-900 border-b border-slate-800 px-6 py-4">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-4">
          <button
            onclick="goBack()"
            class="text-slate-400 hover:text-white transition-colors flex items-center gap-2"
          >
            ← Back to Notes
          </button>
          <span class="text-slate-600">|</span>
          <h1 class="font-bold text-lg">
            📖 <span class="gradient-text">Note Viewer</span>
          </h1>
        </div>
        <div class="flex items-center gap-3">
          <button
            onclick="copyToClipboard()"
            class="glass px-4 py-2 rounded-xl text-sm font-medium hover:bg-white/10 transition-all flex items-center gap-2"
          >
            📋 Copy
          </button>
          <button
            onclick="printNote()"
            class="glass px-4 py-2 rounded-xl text-sm font-medium hover:bg-white/10 transition-all flex items-center gap-2"
          >
            🖨️ Print
          </button>
        </div>
      </div>
    </nav>

    <!-- Note Content -->
    <div class="max-w-4xl mx-auto px-6 py-8">
      <!-- Note Header -->
      <div id="noteHeader" class="mb-8">
        <!-- Content will be populated by JavaScript -->
      </div>

      <!-- Note Body -->
      <div id="noteContent" class="glass rounded-2xl p-8">
        <!-- Content will be populated by JavaScript -->
      </div>
    </div>

    <script>
      // Get note data from URL parameters or localStorage
      function getNoteData() {
        const urlParams = new URLSearchParams(window.location.search);
        const noteId = urlParams.get('id');

        if (!noteId) {
          document.getElementById('noteContent').innerHTML = `
            <div class="text-center py-16">
              <div class="text-6xl mb-4">📖</div>
              <div class="text-slate-400 text-xl mb-4">Note not found</div>
              <button onclick="goBack()" class="glass px-6 py-3 rounded-xl font-medium hover:bg-white/10 transition-all">
                ← Back to Notes
              </button>
            </div>
          `;
          return null;
        }

        // Try to get note data from localStorage (set by notes.html)
        const noteData = localStorage.getItem('currentNote');
        if (noteData) {
          const note = JSON.parse(noteData);
          if (note.id === noteId) {
            return note;
          }
        }

        // Fallback: show error
        document.getElementById('noteContent').innerHTML = `
          <div class="text-center py-16">
            <div class="text-6xl mb-4">🔍</div>
            <div class="text-slate-400 text-xl mb-4">Note data not available</div>
            <button onclick="goBack()" class="glass px-6 py-3 rounded-xl font-medium hover:bg-white/10 transition-all">
              ← Back to Notes
            </button>
          </div>
        `;
        return null;
      }

      // Convert any Google Drive share/view URL to an embeddable /preview URL
      function getDriveEmbedUrl(url) {
        if (!url) return null;
        const match = url.match(/drive\.google\.com\/file\/d\/([^/?]+)/);
        if (match) return `https://drive.google.com/file/d/${match[1]}/preview`;
        const idMatch = url.match(/[?&]id=([^&]+)/);
        if (idMatch) return `https://drive.google.com/file/d/${idMatch[1]}/preview`;
        return null;
      }

      function displayNote(note) {
        // Header
        document.getElementById('noteHeader').innerHTML = `
          <div class="flex items-start gap-4 mb-6">
            <div class="text-5xl">${note.icon || "📖"}</div>
            <div class="flex-1">
              <div class="text-sm font-semibold text-slate-400 uppercase tracking-wider mb-2">
                ${note.subject} • ${note.chapter} • Class ${note.class}
              </div>
              <h1 class="text-3xl font-bold mb-3">${note.title}</h1>
              <p class="text-slate-400 text-lg mb-4">${note.summary}</p>
              <div class="flex gap-2 flex-wrap">
                ${(note.tags || []).map(tag => `<span class="bg-orange-500/20 border border-orange-500/30 px-3 py-1 rounded-lg text-sm text-orange-300">${tag}</span>`).join('')}
              </div>
            </div>
          </div>
        `;

        // Check for a Google Drive URL (externalUrl or driveUrl field)
        const driveRawUrl = note.externalUrl || note.driveUrl || null;
        const embedUrl = getDriveEmbedUrl(driveRawUrl);

        if (embedUrl) {
          // Render embedded Drive PDF viewer
          document.getElementById('noteContent').innerHTML = `
            <div>
              <div class="flex items-center justify-between mb-4">
                <p class="text-slate-400 text-sm">📄 Viewing PDF from Google Drive</p>
                <a href="${driveRawUrl}" target="_blank"
                   class="glass px-4 py-2 rounded-xl text-sm font-medium hover:bg-white/10 transition-all flex items-center gap-2 text-orange-300">
                  🔗 Open in Drive
                </a>
              </div>
              <div class="rounded-xl overflow-hidden border border-slate-700" style="height: 85vh;">
                <iframe
                  src="${embedUrl}"
                  width="100%"
                  height="100%"
                  frameborder="0"
                  allowfullscreen
                  style="background: #1e293b;"
                ></iframe>
              </div>
            </div>
          `;
        } else {
          // Render inline HTML content
          document.getElementById('noteContent').innerHTML = `
            <div class="note-content">
              ${note.content || '<p class="text-slate-400 text-center py-8">Full content coming soon.</p>'}
            </div>
          `;
        }
      }

      function goBack() {
        window.location.href = 'notes.html';
      }

      function copyToClipboard() {
        const content = document.querySelector('.note-content');
        if (content) {
          navigator.clipboard.writeText(content.innerText).then(() => {
            // Simple feedback
            const btn = event.target.closest('button');
            const originalText = btn.innerHTML;
            btn.innerHTML = '✅ Copied!';
            setTimeout(() => btn.innerHTML = originalText, 2000);
          });
        }
      }

      function printNote() {
        window.print();
      }

      // Load note on page load
      document.addEventListener('DOMContentLoaded', () => {
        const note = getNoteData();
        if (note) {
          displayNote(note);
        }
      });
    </script>
  </body>
</html></content>
